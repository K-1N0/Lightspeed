<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightspeed Search | Pro</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: #11141b;
            --sidebar-bg: #161a23;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.06);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-blue: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --pdf-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.02);
            --logo-primary: #ffffff;
        }

        .light-mode {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --sidebar-bg: #f1f5f9;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.06);
            --glass-bg: rgba(0, 0, 0, 0.02);
            --glass-border: rgba(0, 0, 0, 0.1);
            --accent-blue: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.2);
            --pdf-bg: #cbd5e1;
            --card-bg: #ffffff;
            --logo-primary: #0b0e14; /* Dark color for light mode logo */
        }

        /* HIDE RAW FILE INPUT */
        #fileInput {
            display: none !important;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            transition: background 0.3s ease;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1800px;
            height: 96vh;
            background: var(--panel-bg);
            border-radius: 16px;
            display: flex;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .left-panel {
            width: 380px;
            min-width: 380px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: var(--sidebar-bg);
        }

        .header {
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
            /* Transition for the gradient rotation and color swap */
            background: linear-gradient(135deg, var(--logo-primary) 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .light-mode .logo {
            /* Turned 180 degrees (135 + 180 = 315) */
            background: linear-gradient(135deg, var(--logo-primary) 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
        }

        /* Theme Toggle Styling */
        .theme-toggle {
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .sun-icon { display: block; }
        .moon-icon { display: none; }

        .light-mode .sun-icon { display: none; }
        .light-mode .moon-icon { display: block; }

        .section {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            background: var(--glass-bg);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-blue);
            background: var(--panel-bg);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn {
            padding: 10px 16px;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-color);
            background: var(--glass-bg);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--glass-border);
            border-color: var(--text-muted);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #2563eb;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .active-toggle {
            background: var(--accent-blue) !important;
            color: white !important;
            border-color: var(--accent-blue) !important;
        }

        .filter-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .filter-group-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 6px;
            transition: background 0.2s;
            user-select: none;
        }

        .filter-item:hover {
            background: var(--glass-bg);
        }

        .filter-item input {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid var(--glass-border);
            border-radius: 4px;
            background: var(--glass-bg);
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .filter-item input:checked {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .filter-item input:checked::after {
            content: "✓";
            position: absolute;
            color: white;
            font-size: 10px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .subject-group-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 8px;
            opacity: 0.8;
        }

        #dynamicFilterContainer {
            overflow-y: auto;
            max-height: 300px;
            padding-right: 4px;
        }

        .results-section {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
        }

        .result-item {
            padding: 14px;
            background: var(--card-bg);
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .result-item:hover {
            border-color: var(--accent-blue);
            background: var(--glass-bg);
            transform: translateX(4px);
        }

        .result-text {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-color);
            line-height: 1.4;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--pdf-bg);
        }

        .pdf-header {
            padding: 16px 24px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #pdfTitle {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
        }

        #downloadLink {
            font-size: 12px;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: var(--accent-blue);
            border-radius: 6px;
            font-weight: 600;
            display: none;
        }

        iframe {
            flex: 1;
            border: none;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="header">
                <div class="logo">LIGHTSPEED</div>
                <button class="btn theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
                </button>
            </div>

            <div class="section">
                <input type="file" id="fileInput" webkitdirectory directory multiple accept=".json,.pdf">
                <button class="btn btn-primary" style="width: 100%;" onclick="document.getElementById('fileInput').click()">
                    Upload Directory
                </button>
            </div>

            <div class="section">
                <input type="text" id="searchInput" class="search-input" placeholder='Search "keyword1", "keyword2"'>
                <div style="display: flex; gap: 8px; margin-top: 12px;">
                    <button class="btn btn-primary" style="flex: 2;" onclick="performSearch()">Search</button>
                    <button id="noFilterToggle" class="btn" style="flex: 1;" onclick="toggleNoFilter()">No Filter</button>
                </div>
            </div>

            <div class="section" style="flex: 1; overflow: hidden; display: flex; flex-direction: column;">
                <div id="syllabusIndicator" style="font-size: 10px; font-weight: 800; color: var(--accent-blue); margin-bottom: 15px;">SYLLABUS: NONE</div>

                <div class="filter-label">Document Types</div>
                <div class="filter-group-box">
                    <div class="filter-grid">
                        <label class="filter-item"><input type="checkbox" id="filterQP" checked onchange="applyFilter()"> QP</label>
                        <label class="filter-item"><input type="checkbox" id="filterMS" checked onchange="applyFilter()"> MS</label>
                        <label class="filter-item"><input type="checkbox" id="filterER" checked onchange="applyFilter()"> ER</label>
                    </div>
                </div>

                <div class="filter-label">Unit Filters</div>
                <div id="dynamicFilterContainer">
                    <div style="text-align: center; opacity: 0.3; font-size: 11px; padding: 20px;">Upload data to see units</div>
                </div>
            </div>

            <div class="results-section" id="resultsList"></div>
        </div>

        <div class="right-panel">
            <div class="pdf-header">
                <div>
                    <div id="pdfTitle">No Selection</div>
                    <div id="pageInfo" style="font-size: 11px; color: var(--accent-blue); font-weight: 700; margin-top: 2px;"></div>
                </div>
                <a id="downloadLink" target="_blank">Download Resource</a>
            </div>
            <iframe id="pdfViewer"></iframe>
        </div>
    </div>

<script>
    const state = {
        subIndex: {},
        pdfUrls: {},
        allRawResults: [],
        mode: 'NONE',
        noFilterActive: false
    };

    const ialMathsConfig = {
        'Pure Math': { label: 'Pure Mathematics', units: ['WMA11', 'WMA12', 'WMA13', 'WMA14'], count: 4 },
        'Mechanics': { label: 'Mechanics', units: ['WME01', 'WME02', 'WME03'], count: 3 },
        'Stats': { label: 'Statistics', units: ['WST01', 'WST02', 'WST03'], count: 3 },
        'Further': { label: 'Further Pure', units: ['WFM01', 'WFM02', 'WFM03'], count: 3 },
        'Decision': { label: 'Decision', units: ['WDM11'], count: 1 }
    };

    function toggleTheme() { document.body.classList.toggle('light-mode'); }

    function toggleNoFilter() {
        state.noFilterActive = !state.noFilterActive;
        document.getElementById('noFilterToggle').classList.toggle('active-toggle', state.noFilterActive);
        applyFilter();
    }

    function resetApp() {
        // Revoke old object URLs to free up memory
        Object.values(state.pdfUrls).forEach(url => URL.revokeObjectURL(url));

        // Reset state
        state.subIndex = {};
        state.pdfUrls = {};
        state.allRawResults = [];
        state.mode = 'NONE';

        // Clear UI elements
        document.getElementById('resultsList').innerHTML = '';
        document.getElementById('dynamicFilterContainer').innerHTML = '';
        document.getElementById('pdfViewer').src = '';
        document.getElementById('pdfTitle').textContent = 'No file selected';
        document.getElementById('pageInfo').textContent = '';
        document.getElementById('downloadLink').style.display = 'none';
        document.getElementById('syllabusIndicator').textContent = 'Syllabus: None';
        document.getElementById('searchInput').value = '';
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        // BUG FIX: Clear previous content before processing new upload
        resetApp();

        let hasUnit = false;
        let isIALMaths = false;

        for (const file of files) {
            const name = file.name.toLowerCase();

            if (name === 'subindex.json') {
                const text = await file.text();
                try {
                    state.subIndex = JSON.parse(text);
                    for (const recordName of Object.keys(state.subIndex)) {
                        if (recordName.toLowerCase().includes('unit')) hasUnit = true;
                        const upperName = recordName.toUpperCase();
                        if (/^(WMA|WME|WST|WFM|WDM)/.test(upperName)) isIALMaths = true;
                    }
                } catch (err) {
                    console.error('Error parsing subIndex.json:', err);
                }
            } else if (name.endsWith('.pdf')) {
                state.pdfUrls[file.name] = URL.createObjectURL(file);
            }
        }

        if (isIALMaths) {
            state.mode = 'IAL-MATHS';
        } else {
            state.mode = hasUnit ? 'IAL' : 'IGCSE';
        }
        updateUIForMode();
    });

    function updateUIForMode() {
        const grid = document.getElementById('dynamicFilterContainer');
        document.getElementById('syllabusIndicator').textContent = `SYLLABUS: ${state.mode}`;
        grid.innerHTML = '';

        if (state.mode === 'IAL-MATHS') {
            for (const [key, subject] of Object.entries(ialMathsConfig)) {
                const group = document.createElement('div');
                group.className = 'filter-group-box';
                group.innerHTML = `<div class="subject-group-label">${subject.label}</div>`;
                const unitsDiv = document.createElement('div');
                unitsDiv.className = 'filter-grid';
                subject.units.forEach(unitId => {
                    unitsDiv.innerHTML += `<label class="filter-item"><input type="checkbox" id="filter${unitId}" checked onchange="applyFilter()">${unitId}</label>`;
                });
                group.appendChild(unitsDiv);
                grid.appendChild(group);
            }
        } else if (state.mode === 'IAL') {
            const group = document.createElement('div');
            group.className = 'filter-group-box filter-grid';
            for (let i = 1; i <= 6; i++) {
                group.innerHTML += `<label class="filter-item"><input type="checkbox" id="filterUnit${i}" checked onchange="applyFilter()">U${i}</label>`;
            }
            grid.appendChild(group);
        } else {
            const group = document.createElement('div');
            group.className = 'filter-group-box filter-grid';
            ['1', '2', '1R', '2R'].forEach(p => {
                group.innerHTML += `<label class="filter-item"><input type="checkbox" id="filterPaper${p}" checked onchange="applyFilter()">P${p}</label>`;
            });
            grid.appendChild(group);
        }
    }

    function performSearch() {
        const rawTerm = document.getElementById('searchInput').value.trim();
        if (!rawTerm) return;
        const quoteRegex = /"([^"]+)"/g;
        let keywords = [];
        let match;
        while ((match = quoteRegex.exec(rawTerm)) !== null) keywords.push(match[1].toLowerCase().trim());
        if (keywords.length === 0) keywords = [rawTerm.toLowerCase()];

        state.allRawResults = [];
        for (const [recordName, pageData] of Object.entries(state.subIndex)) {
            for (const [pageKey, val] of Object.entries(pageData)) {
                if (pageKey !== "__download_link__" && typeof val === 'string') {
                    if (keywords.some(k => val.toLowerCase().includes(k))) {
                        state.allRawResults.push({ recordName, pageKey, val });
                    }
                }
            }
        }
        applyFilter();
    }

    function applyFilter() {
        if (state.noFilterActive) { displayResults(state.allRawResults); return; }
        const qp = document.getElementById('filterQP').checked;
        const ms = document.getElementById('filterMS').checked;
        const er = document.getElementById('filterER').checked;

        const filtered = state.allRawResults.filter(res => {
            const name = res.recordName.toUpperCase();
            let typeMatch = (qp && name.includes('QUESTIONPAPER')) || (ms && name.includes('MARKSCHEME')) || (er && name.includes('EXAMINERREPORT'));
            let subMatch = false;

            if (state.mode === 'IAL-MATHS') {
                for (const subject of Object.values(ialMathsConfig)) {
                    for (const unitId of subject.units) {
                        const cb = document.getElementById(`filter${unitId}`);
                        if (cb?.checked && name.includes(unitId)) { subMatch = true; break; }
                    }
                    if (subMatch) break;
                }
            } else if (state.mode === 'IAL') {
                for(let i=1; i<=6; i++) {
                    const cb = document.getElementById(`filterUnit${i}`);
                    if(cb?.checked && name.includes(`UNIT${i}`)) subMatch = true;
                }
            } else {
                ['1', '2', '1R', '2R'].forEach(p => {
                    const cb = document.getElementById(`filterPaper${p}`);
                    if (cb?.checked) {
                        const pL = p.toLowerCase();
                        if (pL.endsWith('r')) { if (name.includes(`PAPER${pL}`)) subMatch = true; }
                        else { if (name.includes(`PAPER${pL}`) && !name.includes(`PAPER${pL}R`)) subMatch = true; }
                    }
                });
            }
            return typeMatch && subMatch;
        });
        displayResults(filtered);
    }

    function displayResults(results) {
        const resultsList = document.getElementById('resultsList');
        resultsList.innerHTML = '';
        if (results.length === 0) {
            resultsList.innerHTML = `<div style="opacity:0.3; padding:20px; font-size:12px; text-align:center;">No items matching filters</div>`;
            return;
        }
        results.forEach((result) => {
            const pageNumber = result.pageKey.replace('page_', '');
            const item = document.createElement('div');
            item.className = 'result-item';
            item.innerHTML = `<div class="result-text">${result.recordName}<br><span style="color:var(--accent-blue); font-size:11px;">Page ${pageNumber}</span></div>`;
            item.onclick = () => {
                loadResultInPdf(result);
                const dlLink = document.getElementById('downloadLink');
                const recordData = state.subIndex[result.recordName];
                if (recordData?.__download_link__) {
                    dlLink.href = recordData.__download_link__;
                    dlLink.style.display = 'block';
                } else { dlLink.style.display = 'none'; }
            };
            resultsList.appendChild(item);
        });
    }

    function loadResultInPdf(result) {
        const pdfFileName = result.recordName + '.pdf';
        if (!state.pdfUrls[pdfFileName]) { alert(`PDF not found: ${pdfFileName}`); return; }
        const pageNumber = result.pageKey.replace('page_', '');
        document.getElementById('pdfTitle').textContent = result.recordName;
        document.getElementById('pageInfo').textContent = `VIEWING PAGE ${pageNumber}`;
        document.getElementById('pdfViewer').src = state.pdfUrls[pdfFileName] + '#page=' + pageNumber;
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
</script>
</body>
</html>
